# PenRUSH — SLSA Go builder build configuration (architecture §H.1 / §H.2).
#
# This file is the build contract consumed by the trusted SLSA Go builder
# reusable workflow (slsa-framework/slsa-github-generator .github/workflows/
# builder_go_slsa3.yml). The builder runs THIS recipe inside its isolated,
# provenance-signing environment; the resulting SLSA L3 provenance attests to
# exactly these inputs. Source of truth for the schema:
#   https://github.com/slsa-framework/slsa-github-generator/blob/v2.1.0/internal/builders/go/README.md
#   (fact-checked 2026-06-17)
#
# Reproducibility (§H.1) rests on three pillars, all encoded here + in go.mod:
#   1. CGO_ENABLED=0            — no host C toolchain enters the build.
#   2. flags: -trimpath         — strips absolute filesystem paths.
#   3. ldflags: -s -w -buildid= — strips the symbol table, DWARF, and the
#      non-deterministic build ID. Only deterministic stamps are embedded:
#      {{ .Tag }} (the release tag string). The commit is stamped by the
#      pipeline, NOT here, because the goreleaser template does not expose a
#      stable commit var across the matrix; the release workflow injects it as
#      an evaluated env (see .github/workflows/release.yml). A build TIMESTAMP
#      is deliberately never embedded — it is the classic reproducibility break.
#
# The {{ .Os }} / {{ .Arch }} template vars are filled per matrix entry; the
# builder is invoked once per (os, arch) pair from release.yml.

version: 1

# One binary, named per-platform so a GitHub Release can carry all six
# (linux/darwin/windows × amd64/arm64) without collision.
binary: penrush-{{ .Os }}-{{ .Arch }}

# The package to build — the single-binary entry point.
main: ./cmd/penrush

# Deterministic build environment. CGO off is the cornerstone of the Go team's
# "reproducible build is as simple as CGO_ENABLED=0 go build -trimpath" guarantee
# (go.dev/blog/rebuild).
env:
  - CGO_ENABLED=0

# -trimpath removes machine-specific paths from the binary.
flags:
  - -trimpath

# Deterministic ldflags. main.version is stamped to the release tag; -buildid=
# clears the otherwise-nondeterministic build ID; -s -w drop the symbol/debug
# tables (smaller, and removes another nondeterminism source). main.commit is
# injected by the workflow env (COMMIT) so provenance binds artifact→commit.
ldflags:
  - "-s"
  - "-w"
  - "-buildid="
  - "-X main.version={{ .Tag }}"
  - "-X main.commit={{ .Env.COMMIT }}"
